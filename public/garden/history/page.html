<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>East Asian History Timeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f2ed;
    font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
    color: #1a1a1a;
    overflow-x: auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sticky header ── */
  .sticky-header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(244,242,237,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 10px 24px; display: flex; align-items: baseline; gap: 16px;
  }
  .sticky-header h1 { font-size: 0.85rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #444; }
  .year-indicator { font-size: 0.8rem; color: #999; font-variant-numeric: tabular-nums; }
  .scale-control { display: flex; align-items: center; gap: 6px; margin-left: 12px; }
  .scale-control label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .scale-control input[type="range"] { width: 80px; height: 3px; -webkit-appearance: none; appearance: none; background: rgba(0,0,0,0.1); border-radius: 2px; outline: none; cursor: pointer; }
  .scale-control input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #888; cursor: pointer; }
  .scale-value { font-size: 0.6rem; color: #aaa; font-variant-numeric: tabular-nums; min-width: 28px; }
  .period-indicator { font-size: 0.7rem; color: #aaa; letter-spacing: 0.05em; margin-left: auto; }

  /* ── Date cursor ── */
  .date-cursor { position: fixed; left: 24px; top: 50%; transform: translateY(-50%); z-index: 150; display: flex; align-items: center; gap: 4px; pointer-events: auto; }
  .date-cursor .arrow { width: 0; height: 0; border-top: 5px solid transparent; border-bottom: 5px solid transparent; border-left: 7px solid #a88050; }
  .date-cursor .cursor-year { font-size: 0.6rem; font-weight: 600; color: #a88050; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .date-crosshair { position: fixed; top: 50%; left: 0; right: 0; height: 1px; background: rgba(168,128,80,0.35); pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.15s; }
  .date-crosshair.visible { opacity: 1; }

  /* ── Layout ── */
  .timeline-layout { display: flex; padding: 0 24px 80px; min-width: fit-content; }
  .year-axis { width: 74px; flex-shrink: 0; position: relative; }
  .year-marker { position: absolute; right: 8px; font-size: 0.65rem; color: #c0bdb6; transform: translateY(-50%); font-variant-numeric: tabular-nums; user-select: none; white-space: nowrap; padding: 2px 4px; cursor: default; }
  .year-marker.century { color: #908a80; font-weight: 500; }
  .year-marker.event-yr { color: #a88050; font-weight: 500; font-size: 0.6rem; }
  .year-marker.hover-reveal { opacity: 1 !important; pointer-events: auto !important; }

  .map-wrap { position: relative; overflow: hidden; }
  svg { display: block; background: transparent; }

  /* ── Sticky scroll labels (HTML overlays for tall kingdoms) ── */
  .sticky-label {
    position: absolute;
    pointer-events: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 2px;
    z-index: 5;
    transition: opacity 0.3s ease;
    overflow: hidden;
    padding: 4px 6px;
    box-sizing: border-box;
  }
  .sticky-label .sl-zh { font-weight: 700; line-height: 1.1; white-space: nowrap; }
  .sticky-label .sl-en { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; opacity: 0.85; white-space: nowrap; }
  .sticky-label .sl-sub { font-size: 7px; opacity: 0.6; }
  .sticky-label .sl-dates { font-size: 7px; opacity: 0.45; font-variant-numeric: tabular-nums; }

  .kingdom-poly { stroke-linejoin: round; stroke-width: 0.5; transition: filter 0.2s; cursor: pointer; }
  .kingdom-poly:hover, .kingdom-poly.k-hover { filter: saturate(1.6) brightness(1.1); }
  svg.has-date-highlight .kingdom-poly:not(.date-highlight) { opacity: 0.45; }

  /* Hover tooltip for kingdoms too small for inline labels */
  .kingdom-tooltip {
    position: fixed; pointer-events: none; z-index: 99999;
    padding: 6px 10px; border-radius: 4px;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    text-align: center; opacity: 0; transition: opacity 0.15s;
    white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .kingdom-tooltip.visible { opacity: 1; }
  .kingdom-tooltip .sl-zh { font-weight: 700; font-size: 22px; line-height: 1.1; }
  .kingdom-tooltip .sl-en { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; opacity: 0.85; }
  .kingdom-tooltip .sl-dates { font-size: 7px; opacity: 0.45; font-variant-numeric: tabular-nums; }

  .grid-line { stroke: rgba(0,0,0,0.04); }
  .grid-line.century { stroke: rgba(0,0,0,0.08); }
  .grid-line.event { stroke: rgba(0,0,0,0.04); stroke-dasharray: 3 4; }

  .label-zh { font-weight: 700; text-anchor: middle; pointer-events: none; dominant-baseline: central; }
  .label-en { font-size: 9px; text-anchor: middle; pointer-events: none; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; dominant-baseline: central; }
  .label-sub { font-size: 7px; text-anchor: middle; pointer-events: none; dominant-baseline: central; opacity: 0.6; }
  .label-dates { font-size: 7px; text-anchor: middle; pointer-events: none; dominant-baseline: central; opacity: 0.45; font-variant-numeric: tabular-nums; }

  .period-col { width: 28px; flex-shrink: 0; position: relative; margin-left: 8px; }
  .period-label { position: absolute; writing-mode: vertical-rl; text-orientation: mixed; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(0,0,0,0.12); font-weight: 700; user-select: none; left: 0; }
  .period-label .hanzi { display: block; margin-top: 8px; font-size: 0.72rem; letter-spacing: 0.12em; }

  .intro { padding: 24px 24px 16px; max-width: 720px; }
  .intro h2 { font-size: 1rem; font-weight: 500; margin-bottom: 4px; }
  .intro .range { font-size: 0.75rem; color: #999; margin-bottom: 8px; }
  .intro .note { font-size: 0.75rem; color: #aaa; line-height: 1.5; }

  /* ── Korea panel ── */
  .korea-toggle { position: relative; width: 24px; flex-shrink: 0; cursor: pointer; z-index: 10; }
  .korea-toggle-btn { position: sticky; top: 60px; writing-mode: vertical-rl; text-orientation: mixed; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #888; background: rgba(244,242,237,0.9); border: 1px solid rgba(0,0,0,0.08); border-radius: 4px; padding: 8px 4px; cursor: pointer; user-select: none; white-space: nowrap; }
  .korea-toggle-btn:hover { color: #555; background: rgba(230,228,223,0.95); }
  .korea-panel { overflow: hidden; transition: width 0.3s ease, opacity 0.3s ease; flex-shrink: 0; }
  .korea-panel.collapsed { width: 0 !important; opacity: 0; pointer-events: none; }
  .korea-panel .map-wrap { position: relative; overflow: hidden; }

  /* ── Mongolia panel ── */
  .mongol-toggle { position: relative; width: 24px; flex-shrink: 0; cursor: pointer; z-index: 10; }
  .mongol-toggle-btn { position: sticky; top: 60px; writing-mode: vertical-rl; text-orientation: mixed; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #888; background: rgba(244,242,237,0.9); border: 1px solid rgba(0,0,0,0.08); border-radius: 4px; padding: 8px 4px; cursor: pointer; user-select: none; white-space: nowrap; }
  .mongol-toggle-btn:hover { color: #555; background: rgba(230,228,223,0.95); }
  .mongol-panel { overflow: hidden; transition: width 0.3s ease, opacity 0.3s ease; flex-shrink: 0; }
  .mongol-panel.collapsed { width: 0 !important; opacity: 0; pointer-events: none; }
  .mongol-panel .map-wrap { position: relative; overflow: hidden; }

  /* ── Japan panel ── */
  .japan-toggle { position: relative; width: 24px; flex-shrink: 0; cursor: pointer; z-index: 10; }
  .japan-toggle-btn { position: sticky; top: 60px; writing-mode: vertical-rl; text-orientation: mixed; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #888; background: rgba(244,242,237,0.9); border: 1px solid rgba(0,0,0,0.08); border-radius: 4px; padding: 8px 4px; cursor: pointer; user-select: none; white-space: nowrap; }
  .japan-toggle-btn:hover { color: #555; background: rgba(230,228,223,0.95); }
  .japan-panel { overflow: hidden; transition: width 0.3s ease, opacity 0.3s ease; flex-shrink: 0; }
  .japan-panel.collapsed { width: 0 !important; opacity: 0; pointer-events: none; }
  .japan-panel .map-wrap { position: relative; overflow: hidden; }
</style>
</head>
<body>

<header class="sticky-header">
  <h1>East Asian History</h1>
  <span class="year-indicator" id="yearIndicator">2070 BCE</span>
  <div class="scale-control">
    <label>Scale</label>
    <input type="range" id="scaleSlider" min="1" max="10" step="0.1" value="4">
    <span class="scale-value" id="scaleValue">4.0 px/yr</span>
  </div>
  <span class="period-indicator" id="periodIndicator"></span>
</header>

<div class="intro">
  <h2>China: Xia Dynasty through Present</h2>
  <div class="range">2070 BCE – 2026 CE</div>
  <div class="note">Scroll down to move forward in time.</div>
</div>

<div class="date-cursor" id="dateCursor"><div class="arrow"></div><div class="cursor-year" id="cursorYear"></div></div>
<div class="date-crosshair" id="dateCrosshair"></div>

<main>
  <div class="timeline-layout" id="timeline">
    <div class="mongol-panel collapsed" id="mongolPanel"><div class="map-wrap" id="mongolMapWrap"></div></div>
    <div class="mongol-toggle" onclick="toggleMongol()"><div class="mongol-toggle-btn" id="mongolToggleBtn">🇲🇳</div></div>
    <div class="year-axis" id="yearAxis"></div>
    <div class="map-wrap" id="mapWrap"></div>
    <div class="period-col" id="periodCol"></div>
    <div class="korea-toggle" onclick="toggleKorea()"><div class="korea-toggle-btn" id="koreaToggleBtn">🇰🇷</div></div>
    <div class="korea-panel collapsed" id="koreaPanel"><div class="map-wrap" id="koreaMapWrap"></div></div>
    <div class="japan-toggle" onclick="toggleJapan()"><div class="japan-toggle-btn" id="japanToggleBtn">🇯🇵</div></div>
    <div class="japan-panel collapsed" id="japanPanel"><div class="map-wrap" id="japanMapWrap"></div></div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  SVG POLYGON ARCHITECTURE
//
//  Each kingdom = array of phases { start, end, x1, x2 }

//  generatePath() traces left edges down, right edges up → SVG path
//  Rescaling: change scaleY, re-render. Labels adapt automatically.
// ═══════════════════════════════════════════════════════════════

const BASE_YEAR = -2070;
const END_YEAR  = 2026;
const DEFAULT_SCALE_X = 10;
let SCALE_X = DEFAULT_SCALE_X;
let WIDTH   = 100 * SCALE_X;
let scaleY  = 4;

const fmtYr = y => y < 0 ? Math.abs(y) + ' BCE' : y === 0 ? '1 BCE' : y + ' CE';
const yPos = y => (y - BASE_YEAR) * scaleY;

function getContrast(hex) {
  const r = parseInt(hex.substr(1,2),16), g = parseInt(hex.substr(3,2),16), b = parseInt(hex.substr(5,2),16);
  return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? '#1a1a1a' : '#f8f8f6';
}

//  SVG RENDERING

const NS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs) {
  const el = document.createElementNS(NS, tag);
  for (const k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}

function generatePath(phases) {
  let d = "";
  for (let i = 0; i < phases.length; i++) {
    const x = phases[i].x1 * SCALE_X;
    const yT = yPos(phases[i].start);
    const yB = yPos(phases[i].end);
    d += (i === 0 ? `M ${x} ${yT} ` : `L ${x} ${yT} `);
    d += `L ${x} ${yB} `;
  }
  for (let i = phases.length - 1; i >= 0; i--) {
    const x = phases[i].x2 * SCALE_X;
    const yT = yPos(phases[i].start);
    const yB = yPos(phases[i].end);
    d += `L ${x} ${yB} L ${x} ${yT} `;
  }
  return d + "Z";
}

function getLargestPhase(phases) {
  return phases.reduce((best, p) => {
    const area = (p.end - p.start) * (p.x2 - p.x1);
    return area > (best.end - best.start) * (best.x2 - best.x1) ? p : best;
  });
}

const mapWrap = document.getElementById('mapWrap');
const yearAxis = document.getElementById('yearAxis');
const periodCol = document.getElementById('periodCol');
const markerEls = {};
let stickyLabels = []; // { el, topPx, botPx, cx } for scroll positioning
let koreaStickyLabels = [];

let tooltipEl = null;
function render() {
  mapWrap.innerHTML = '';
  yearAxis.innerHTML = '';
  periodCol.innerHTML = '';
  stickyLabels = [];
  const tooltipData = [];

  const height = (END_YEAR - BASE_YEAR) * scaleY;
  const svg = svgEl('svg', { width: WIDTH, height: height });

  // Gridlines
  const fc = Math.ceil(BASE_YEAR / 100) * 100;
  for (let y = fc; y <= END_YEAR; y += 100)
    svg.appendChild(svgEl('line', { x1:0, y1:yPos(y), x2:WIDTH, y2:yPos(y), class:'grid-line century' }));
  const f5 = Math.ceil(BASE_YEAR / 50) * 50;
  for (let y = f5; y <= END_YEAR; y += 50) {
    if (y % 100 === 0) continue;
    svg.appendChild(svgEl('line', { x1:0, y1:yPos(y), x2:WIDTH, y2:yPos(y), class:'grid-line' }));
  }
  EVENT_YEARS.forEach(y => svg.appendChild(svgEl('line', { x1:0, y1:yPos(y), x2:WIDTH, y2:yPos(y), class:'grid-line event' })));

  // Kingdom polygons + labels
  data.forEach((k, idx) => {
    const pathAttrs = { d: generatePath(k.poly), fill: k.color, stroke: k.color, class:'kingdom-poly', 'data-idx': idx };
    if (k.group) { pathAttrs['data-group'] = k.group; }
    const path = svgEl('path', pathAttrs);
    const allS = k.poly.map(p => p.start), allE = k.poly.map(p => p.end);
    path.dataset.start = Math.min(...allS);
    path.dataset.end = Math.max(...allE);
    const tt = svgEl('title', {}); tt.textContent = `${k.name} (${k.zh})`; path.appendChild(tt);
    svg.appendChild(path);

    if (!k.hideLabel) {
      const lp = k.labelRect || (k.labelPhase != null ? k.poly[k.labelPhase] : getLargestPhase(k.poly));
      const cx = ((lp.x1 + lp.x2) / 2) * SCALE_X;
      const cy = yPos((lp.start + lp.end) / 2);
      const pxW = (lp.x2 - lp.x1) * SCALE_X;
      const pxH = (lp.end - lp.start) * scaleY;
      const tc = getContrast(k.color);
      // Uniform labels for side-by-side states (cap 28), bigger for full-width dynasties (cap 42)
      const maxHz = pxW > 300 ? 42 : pxW > 200 ? 36 : 28;
      const hzDiv = pxW > 200 ? 2.5 : 3;
      const hz = Math.round(Math.min(Math.max(12, pxH/hzDiv), Math.max(12, 8 + Math.sqrt(pxW) * 2), maxHz));

      const isTall = pxH > 300;
      // Only force sticky for groups with multiple labeled entries (fade system)
      const groupLabelCount = k.group ? data.filter(d => d.group === k.group && !d.hideLabel).length : 0;
      const forceSticky = groupLabelCount > 1;

      const inLateSection = lp.start >= 220;
      if ((isTall || forceSticky) && !k.noSticky && !inLateSection && pxW > 25) {
        // ── HTML overlay label that sticks on scroll ──
        // Use full polygon span for positioning (all phases combined)
        const allStarts = k.poly.map(p => p.start), allEnds = k.poly.map(p => p.end);
        const topPx = yPos(Math.min(...allStarts));
        const actualEnd = Math.max(...allEnds);
        // Align sticky bottom: explicit override or auto-align for warring states
        const ALIGN_BOT = -221;
        const isAligned = k.stickyAlignBot != null || (actualEnd <= ALIGN_BOT && actualEnd >= -235);
        const alignedEnd = k.stickyAlignBot != null ? k.stickyAlignBot : (isAligned ? ALIGN_BOT : actualEnd);
        const botPx = yPos(alignedEnd);
        const el = document.createElement('div');
        el.className = 'sticky-label';
        el.style.color = tc;
        el.style.left = (lp.x1 * SCALE_X) + 'px';
        el.style.width = pxW + 'px';

        let inner = `<div class="sl-zh" style="font-size:${hz}px">${k.zh}</div>`;
        inner += `<div class="sl-en">${k.name}</div>`;
        if (k.sub) inner += `<div class="sl-sub">${k.sub}</div>`;
        const s = k.poly[0].start, e = k.poly[k.poly.length-1].end;
        inner += `<div class="sl-dates">${fmtYr(s)} – ${fmtYr(e)}</div>`;
        el.innerHTML = inner;

        mapWrap.appendChild(el);
        const aligned = isAligned;
        stickyLabels.push({ el, topPx, botPx, cx, group: k.group || null, aligned, noGroupFade: !!k.noGroupFade });

      } else if (pxW > 25 && pxH > 10) {
        // ── Static SVG labels for smaller kingdoms ──
        // Use same hz as sticky labels (Wu benchmark: ~28px for single columns)
        const s = k.poly[0].start, e = k.poly[k.poly.length-1].end;
        // Always register tooltip for non-full-label blocks
        const ttIdx = tooltipData.length;
        const ttEntry = { name:k.name, zh:k.zh, sub:k.sub, color:k.color, tc, s, e, cx, cy, pxW };
        // Tier 1: Full label (zh + en + dates)
        const fullLabelH = hz + 40;
        if (pxH > fullLabelH && pxW > 80) {
          svg.appendChild(svgEl('text', { x:cx, y:cy-8, fill:tc, class:'label-zh', 'font-size':hz })).textContent = k.zh;
          svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+4, fill:tc, class:'label-en' })).textContent = k.name;
          if (k.sub && pxH > fullLabelH + 14) svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+16, fill:tc, class:'label-sub' })).textContent = k.sub;
          svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+(k.sub && pxH>fullLabelH+14?26:16), fill:tc, class:'label-dates' })).textContent = fmtYr(s)+' – '+fmtYr(e);
        // Tier 2: Chinese character only at standard size (28px) + tooltip
        } else if (pxH > 28 && pxW > 28) {
          svg.appendChild(svgEl('text', { x:cx, y:cy, fill:tc, class:'label-zh', 'font-size':28 })).textContent = k.zh;
          path.dataset.tooltipIdx = ttIdx;
          tooltipData.push(ttEntry);
        // Tier 3: No inline label — tooltip only
        } else {
          path.dataset.tooltipIdx = ttIdx;
          tooltipData.push(ttEntry);
        }
      }
    }
  });

  mapWrap.appendChild(svg);

  // ── Hover tooltips for tiny kingdoms ──
  if (tooltipEl) tooltipEl.remove();
  if (tooltipData.length > 0) {
    tooltipEl = document.createElement('div');
    tooltipEl.className = 'kingdom-tooltip';
    mapWrap.appendChild(tooltipEl);
    svg.querySelectorAll('[data-tooltip-idx]').forEach(path => {
      const td = tooltipData[parseInt(path.dataset.tooltipIdx)];
      path.addEventListener('mouseenter', (e) => {
        tooltipEl.style.background = td.color;
        tooltipEl.style.color = td.tc;
        let html = `<div class="sl-zh">${td.zh}</div>`;
        html += `<div class="sl-en">${td.name}</div>`;
        if (td.sub) html += `<div class="sl-en" style="opacity:0.6">${td.sub}</div>`;
        html += `<div class="sl-dates">${fmtYr(td.s)} – ${fmtYr(td.e)}</div>`;
        tooltipEl.innerHTML = html;
        const wr = mapWrap.getBoundingClientRect();
        tooltipEl.style.left = (wr.left + td.cx) + 'px';
        tooltipEl.style.top = (wr.top + td.cy) + 'px';
        tooltipEl.style.transform = 'translate(-50%, -50%)';
        tooltipEl.classList.add('visible');
      });
      path.addEventListener('mouseleave', () => {
        tooltipEl.classList.remove('visible');
      });
    });
  }

  // Year axis markers
  const MIN_GAP = 14;
  const markers = [];
  for (let y = fc; y <= END_YEAR; y += 100) markers.push({y, cls:'century', pri:2});
  for (let y = f5; y <= END_YEAR; y += 50) { if (y%100===0) continue; markers.push({y, cls:'', pri:1}); }
  EVENT_YEARS.forEach(y => markers.push({y, cls:'event-yr', pri:0}));
  markers.sort((a,b) => b.pri - a.pri || a.y - b.y);

  const placedPx = [];
  for (const k in markerEls) delete markerEls[k];

  markers.forEach(m => {
    const px = yPos(m.y);
    const tooClose = placedPx.some(p => Math.abs(px-p) < MIN_GAP);
    const mk = document.createElement('div');
    mk.className = 'year-marker ' + m.cls;
    mk.style.top = px + 'px';
    mk.textContent = fmtYr(m.y);
    mk.dataset.markerY = m.y;
    if (tooClose) { mk.style.opacity = '0'; mk.style.pointerEvents = 'none'; }
    yearAxis.appendChild(mk);
    if (!markerEls[m.y]) markerEls[m.y] = [];
    markerEls[m.y].push(mk);
    if (!tooClose) placedPx.push(px);
  });

  // Period labels
  PERIODS.forEach(p => {
    const el = document.createElement('div');
    el.className = 'period-label';
    el.style.top = (yPos(p.s) + 8) + 'px';
    el.style.height = Math.max(40, (p.e - p.s) * scaleY - 16) + 'px';
    el.innerHTML = `${p.name}<span class="hanzi">${p.hanzi}</span>`;
    periodCol.appendChild(el);
  });

  setupHover();
}

//  HOVER INTERACTIONS
// ═══════════════════════════════════════════════════════════════

function setupHover() {
  const svg = mapWrap.querySelector('svg');
  if (!svg) return;
  const polys = svg.querySelectorAll('.kingdom-poly');

  // Build group map for seamless hover
  const groupMap = {};
  polys.forEach(path => {
    const g = path.dataset.group;
    if (g) { if (!groupMap[g]) groupMap[g] = []; groupMap[g].push(path); }
  });

  let activeMarkers = [];
  let hoverGroup = [];
  polys.forEach(path => {
    path.addEventListener('mouseenter', () => {
      activeMarkers.forEach(mk => mk.classList.remove('hover-reveal'));
      activeMarkers = [];
      hoverGroup.forEach(p => { p.style.filter = ''; });
      hoverGroup = [];

      // Highlight all group siblings
      const g = path.dataset.group;
      const siblings = g ? groupMap[g] : [path];
      siblings.forEach(p => {
        p.style.filter = 'saturate(1.6) brightness(1.1)';
        hoverGroup.push(p);
      });

      // Reveal year markers for full group span
      const years = new Set();
      siblings.forEach(p => { years.add(parseFloat(p.dataset.start)); years.add(parseFloat(p.dataset.end)); });
      const visPx = [];
      yearAxis.querySelectorAll('.year-marker').forEach(mk => {
        if (mk.style.opacity !== '0' && !mk.classList.contains('hover-reveal'))
          visPx.push(parseFloat(mk.style.top));
      });
      years.forEach(y => {
        if (!markerEls[y]) return;
        markerEls[y].forEach(mk => {
          const px = yPos(y);
          if (visPx.some(p => Math.abs(px-p) < 14)) return;
          mk.classList.add('hover-reveal');
          activeMarkers.push(mk);
          visPx.push(px);
        });
      });
    });
    path.addEventListener('mouseleave', () => {
      activeMarkers.forEach(mk => mk.classList.remove('hover-reveal'));
      activeMarkers = [];
      hoverGroup.forEach(p => { p.style.filter = ''; });
      hoverGroup = [];
    });
  });

  const entsByYear = {};
  polys.forEach(path => {
    [parseFloat(path.dataset.start), parseFloat(path.dataset.end)].forEach(y => {
      if (!entsByYear[y]) entsByYear[y] = [];
      entsByYear[y].push(path);
    });
  });

  let activeHL = [];
  yearAxis.querySelectorAll('.year-marker').forEach(mk => {
    const y = parseFloat(mk.dataset.markerY);
    mk.addEventListener('mouseenter', () => {
      activeHL.forEach(el => el.classList.remove('date-highlight'));
      activeHL = [];
      if (entsByYear[y]) {
        svg.classList.add('has-date-highlight');
        entsByYear[y].forEach(el => { el.classList.add('date-highlight'); activeHL.push(el); });
      }
    });
    mk.addEventListener('mouseleave', () => {
      svg.classList.remove('has-date-highlight');
      activeHL.forEach(el => el.classList.remove('date-highlight'));
      activeHL = [];
    });
  });
}

// ═══════════════════════════════════════════════════════════════
//  SCROLL + SCALE
// ═══════════════════════════════════════════════════════════════

const yearIndicator = document.getElementById('yearIndicator');
const periodIndicator = document.getElementById('periodIndicator');
const cursorYear = document.getElementById('cursorYear');
const dateCursor = document.getElementById('dateCursor');
const dateCrosshair = document.getElementById('dateCrosshair');

dateCursor.addEventListener('mouseenter', () => dateCrosshair.classList.add('visible'));
dateCursor.addEventListener('mouseleave', () => dateCrosshair.classList.remove('visible'));

const HEADER_H = 42;

function onScroll() {
  const vpH = window.innerHeight, vpMid = vpH / 2;
  const r = mapWrap.getBoundingClientRect();
  const yr = BASE_YEAR + (vpMid - r.top) / scaleY;
  const c = Math.max(BASE_YEAR, Math.min(END_YEAR, Math.round(yr)));
  const s = fmtYr(c);
  yearIndicator.textContent = s;
  cursorYear.textContent = s;
  dateCursor.style.opacity = (r.top < vpH && r.bottom > 0) ? '1' : '0';
  let pName = '';
  for (const p of PERIODS) { if (c >= p.s && c < p.e) { pName = p.name + '  ' + p.hanzi; break; } }
  periodIndicator.textContent = pName;

  // ── Position sticky labels to follow viewport center ──
  const vpMidInMap = vpMid - r.top;
  for (const sl of stickyLabels) {
    const elH = sl.el.offsetHeight;
    const blockTop = r.top + sl.topPx;
    const blockBot = r.top + sl.botPx;
    const blockH = sl.botPx - sl.topPx;

    // Visible portion of the block
    const visTop = Math.max(blockTop, HEADER_H);
    const visBot = Math.min(blockBot, vpH);
    if (visBot <= visTop) { sl.el.style.opacity = '0'; sl.el.dataset.hidden = '1'; continue; }
    sl.el.dataset.hidden = '';

    // Target: viewport center, clamped to block bounds
    const minEdgeTop = Math.min(blockH * 0.1, 24);
    const minEdgeBot = sl.aligned ? 48 : minEdgeTop;
    const targetInBlock = vpMid - blockTop - elH / 2;
    const clampedTop = Math.max(minEdgeTop, Math.min(blockH - elH - minEdgeBot, targetInBlock));
    sl.el.style.top = (sl.topPx + clampedTop) + 'px';
  }

  // ── Group-aware label opacity: one active, others dimmed ──
  const groupLabels = {};
  for (const sl of stickyLabels) {
    if (sl.group && !sl.noGroupFade) {
      if (!groupLabels[sl.group]) groupLabels[sl.group] = [];
      groupLabels[sl.group].push(sl);
    } else if (sl.el.dataset.hidden !== '1') {
      sl.el.style.opacity = '1';
    }
  }
  for (const g in groupLabels) {
    const labels = groupLabels[g];
    const visible = labels.filter(sl => sl.el.dataset.hidden !== '1');
    if (visible.length <= 1) {
      visible.forEach(sl => { sl.el.style.opacity = '1'; });
      continue;
    }
    // Active label = block whose vertical center is closest to viewport center
    let activeIdx = 0;
    const fadeZonePx = 60;
    let minDist = Infinity;
    visible.forEach((sl, i) => {
      const mid = (sl.topPx + sl.botPx) / 2;
      const dist = Math.abs(vpMidInMap - mid);
      if (dist < minDist) { minDist = dist; activeIdx = i; }
    });
    // Get positions of active and secondary labels to check overlap
    const activeLabel = activeIdx >= 0 ? visible[activeIdx] : null;
    visible.forEach((sl, i) => {
      if (i === activeIdx) {
        const nearTop = Math.abs(vpMidInMap - sl.topPx) < fadeZonePx;
        const nearBot = Math.abs(vpMidInMap - sl.botPx) < fadeZonePx;
        sl.el.style.opacity = (nearTop || nearBot) ? '0.8' : '1';
      } else {
        // Hide secondary if it would overlap the primary label
        let hidden = false;
        if (activeLabel) {
          const aTop = parseFloat(activeLabel.el.style.top) || 0;
          const aBot = aTop + activeLabel.el.offsetHeight;
          const sTop = parseFloat(sl.el.style.top) || 0;
          const sBot = sTop + sl.el.offsetHeight;
          const overlap = sTop < aBot + 20 && sBot > aTop - 20;
          if (overlap) { sl.el.style.opacity = '0'; hidden = true; }
        }
        if (!hidden) {
          const nearBot = Math.abs(vpMidInMap - sl.botPx) < fadeZonePx;
          const nearTop = Math.abs(vpMidInMap - sl.topPx) < fadeZonePx;
          sl.el.style.opacity = (nearBot || nearTop) ? '0.4' : '0';
        }
      }
    });
  }

  // ── Korea sticky labels ──
  if (koreaOpen && koreaStickyLabels.length) {
    const kr = koreaMapWrap.getBoundingClientRect();
    const vpMidInKorea = vpMid - kr.top;
    for (const sl of koreaStickyLabels) {
      const elH = sl.el.offsetHeight;
      const blockTop = kr.top + sl.topPx;
      const blockBot = kr.top + sl.botPx;
      const blockH = sl.botPx - sl.topPx;
      const visTop = Math.max(blockTop, HEADER_H);
      const visBot = Math.min(blockBot, vpH);
      if (visBot <= visTop) { sl.el.dataset.hidden = '1'; sl.el.style.opacity = '0'; continue; }
      sl.el.dataset.hidden = '0';
      if (sl.isSvgLabel) continue; // SVG labels don't reposition, just need visibility
      const minEdge = Math.min(blockH * 0.1, 24);
      const targetInBlock = vpMid - blockTop - elH / 2;
      const clampedTop = Math.max(minEdge, Math.min(blockH - elH - minEdge, targetInBlock));
      sl.el.style.top = (sl.topPx + clampedTop) + 'px';
    }
    // Group-aware fade: show only closest label per group
    const kGroupLabels = {};
    for (const sl of koreaStickyLabels) {
      if (sl.group && !sl.noGroupFade) {
        if (!kGroupLabels[sl.group]) kGroupLabels[sl.group] = [];
        kGroupLabels[sl.group].push(sl);
      } else if (sl.el.dataset.hidden !== '1') {
        sl.el.style.opacity = '1';
      }
    }
    for (const g in kGroupLabels) {
      const labels = kGroupLabels[g];
      const visible = labels.filter(sl => sl.el.dataset.hidden !== '1');
      if (visible.length <= 1) { visible.forEach(sl => { sl.el.style.opacity = '1'; }); continue; }
      let activeIdx = 0, minDist = Infinity;
      visible.forEach((sl, i) => {
        const mid = (sl.topPx + sl.botPx) / 2;
        const dist = Math.abs(vpMidInKorea - mid);
        if (dist < minDist) { minDist = dist; activeIdx = i; }
      });
      const activeLabel = visible[activeIdx];
      visible.forEach((sl, i) => {
        if (i === activeIdx) {
          const fadeZonePx = 60;
          const nearTop = Math.abs(vpMidInKorea - sl.topPx) < fadeZonePx;
          const nearBot = Math.abs(vpMidInKorea - sl.botPx) < fadeZonePx;
          sl.el.style.opacity = (nearTop || nearBot) ? '0.8' : '1';
        } else {
          const aTop = parseFloat(activeLabel.el.style.top) || 0;
          const aBot = aTop + activeLabel.el.offsetHeight;
          const sTop = parseFloat(sl.el.style.top) || 0;
          const sBot = sTop + sl.el.offsetHeight;
          const overlap = sTop < aBot + 20 && sBot > aTop - 20;
          sl.el.style.opacity = overlap ? '0' : '0';
        }
      });
    }
  }

  // ── Mongolia sticky labels ──
  if (mongolOpen && mongolStickyLabels.length) {
    const mr = mongolMapWrap.getBoundingClientRect();
    const vpMidInMongol = vpMid - mr.top;
    for (const sl of mongolStickyLabels) {
      const elH = sl.el.offsetHeight;
      const blockTop = mr.top + sl.topPx;
      const blockBot = mr.top + sl.botPx;
      const blockH = sl.botPx - sl.topPx;
      const visTop = Math.max(blockTop, HEADER_H);
      const visBot = Math.min(blockBot, vpH);
      if (visBot <= visTop) { sl.el.dataset.hidden = '1'; sl.el.style.opacity = '0'; continue; }
      sl.el.dataset.hidden = '0';
      const minEdge = Math.min(blockH * 0.1, 24);
      const targetInBlock = vpMid - blockTop - elH / 2;
      const clampedTop = Math.max(minEdge, Math.min(blockH - elH - minEdge, targetInBlock));
      sl.el.style.top = (sl.topPx + clampedTop) + 'px';
    }
    for (const sl of mongolStickyLabels) {
      if (sl.el.dataset.hidden !== '1') sl.el.style.opacity = '1';
    }
  }

  // ── Japan sticky labels ──
  if (japanOpen && japanStickyLabels.length) {
    const jr = japanMapWrap.getBoundingClientRect();
    const vpMidInJapan = vpMid - jr.top;
    for (const sl of japanStickyLabels) {
      const elH = sl.el.offsetHeight;
      const blockTop = jr.top + sl.topPx;
      const blockBot = jr.top + sl.botPx;
      const blockH = sl.botPx - sl.topPx;
      const visTop = Math.max(blockTop, HEADER_H);
      const visBot = Math.min(blockBot, vpH);
      if (visBot <= visTop) { sl.el.dataset.hidden = '1'; sl.el.style.opacity = '0'; continue; }
      sl.el.dataset.hidden = '0';
      const minEdge = Math.min(blockH * 0.1, 24);
      const targetInBlock = vpMid - blockTop - elH / 2;
      const clampedTop = Math.max(minEdge, Math.min(blockH - elH - minEdge, targetInBlock));
      sl.el.style.top = (sl.topPx + clampedTop) + 'px';
    }
    for (const sl of japanStickyLabels) {
      if (sl.el.dataset.hidden !== '1') sl.el.style.opacity = '1';
    }
  }
}
window.addEventListener('scroll', onScroll, { passive: true });

const scaleSlider = document.getElementById('scaleSlider');
const scaleValueEl = document.getElementById('scaleValue');
scaleSlider.addEventListener('input', () => {
  const r = mapWrap.getBoundingClientRect();
  const vpMid = window.innerHeight / 2;
  const curYear = BASE_YEAR + (vpMid - r.top) / scaleY;
  scaleY = parseFloat(scaleSlider.value);
  scaleValueEl.textContent = scaleY.toFixed(1) + ' px/yr';
  render();
  if (koreaOpen) renderKorea();
  const mainTop = mapWrap.closest('main').offsetTop;
  window.scrollTo(0, mainTop + yPos(curYear) - vpMid);
  onScroll();
});

const koreaMapWrap = document.getElementById('koreaMapWrap');
const koreaPanel = document.getElementById('koreaPanel');
let koreaOpen = false;

function computeWidths() {
  const toggleW = 24 * (1 + (mongolOpen?0:1) + (koreaOpen?0:1) + (japanOpen?0:1));
  const vw = window.innerWidth;
  const rightPanels = (koreaOpen ? 1 : 0) + (japanOpen ? 1 : 0);
  const leftPanels = mongolOpen ? 1 : 0;
  const panels = rightPanels + leftPanels;
  const baseChrome = 74 + 28 + 48 + 24 + toggleW;
  if (panels > 0) {
    const usable = vw - baseChrome;
    const chinaHidden = document.getElementById('mapWrap').style.display === 'none';
    const chinaShare = panels >= 3 ? 0.30 : panels === 2 ? 0.40 : 0.57;
    const chinaW = chinaHidden ? 0 : Math.max(300, Math.min(750, Math.round(usable * chinaShare)));
    const remaining = usable - chinaW;
    let mongolW = 0, koreaW = 0, japanW = 0;
    if (mongolOpen) mongolW = Math.round(remaining / panels);
    if (koreaOpen) koreaW = Math.round(remaining / panels);
    if (japanOpen) japanW = remaining - mongolW - koreaW;
    SCALE_X = chinaW / 100 || DEFAULT_SCALE_X;
    WIDTH = chinaW || 100 * DEFAULT_SCALE_X;
    return { mongolW, koreaW, japanW };
  } else {
    SCALE_X = DEFAULT_SCALE_X;
    WIDTH = 100 * SCALE_X;
    return { mongolW: 0, koreaW: 0, japanW: 0 };
  }
}

function rerenderAll() {
  computeWidths();
  render();
  if (mongolOpen) renderMongol();
  if (koreaOpen) renderKorea();
  if (japanOpen) renderJapan();
  onScroll();
}

function toggleKorea() {
  koreaOpen = !koreaOpen;
  koreaPanel.classList.toggle('collapsed', !koreaOpen);
  document.getElementById('koreaToggleBtn').textContent = koreaOpen ? '◂' : '🇰🇷';
  rerenderAll();
}

let koreaTooltipEl = null;
function renderKorea() {
  koreaMapWrap.innerHTML = '';
  koreaStickyLabels = [];
  const koreaTooltipData = [];
  const height = (END_YEAR - BASE_YEAR) * scaleY;
  const { koreaW: kW } = computeWidths();
  koreaPanel.style.width = kW + 'px';
  const svg = svgEl('svg', { width: kW, height: height });
  const kScale = kW / 100;

  // Grid lines (matching China)
  const fc = Math.ceil(BASE_YEAR / 100) * 100;
  for (let y = fc; y <= END_YEAR; y += 100)
    svg.appendChild(svgEl('line', { x1:0, y1:yPos(y), x2:kW, y2:yPos(y), class:'grid-line century' }));

  // Korea polygons
  koreaData.forEach((k, idx) => {
    const phases = k.poly;
    // Generate path using Korea scale
    let d = "";
    for (let i = 0; i < phases.length; i++) {
      const x = phases[i].x1 * kScale;
      const yT = yPos(phases[i].start);
      const yB = yPos(phases[i].end);
      d += (i === 0 ? `M ${x} ${yT} ` : `L ${x} ${yT} `);
      d += `L ${x} ${yB} `;
    }
    for (let i = phases.length - 1; i >= 0; i--) {
      const x = phases[i].x2 * kScale;
      const yT = yPos(phases[i].start);
      const yB = yPos(phases[i].end);
      d += `L ${x} ${yB} L ${x} ${yT} `;
    }
    d += "Z";

    const path = svgEl('path', { d, fill: k.color, stroke: k.color, class:'kingdom-poly', 'data-idx': 'k'+idx });
    if (k.name) path.dataset.kname = k.name;
    const tt = svgEl('title', {}); tt.textContent = `${k.name} (${k.zh})`; path.appendChild(tt);
    svg.appendChild(path);

    // Labels
    if (!k.hideLabel) {
      const lp = k.labelRect || (k.labelPhase != null ? k.poly[k.labelPhase] : getLargestPhase(k.poly));
      const cx = ((lp.x1 + lp.x2) / 2) * kScale;
      const cy = yPos((lp.start + lp.end) / 2);
      const pxW = (lp.x2 - lp.x1) * kScale;
      const pxH = (lp.end - lp.start) * scaleY;
      const tc = getContrast(k.color);
      const maxHz = pxW > 300 ? 42 : pxW > 200 ? 36 : 28;
      const hzDiv = pxW > 200 ? 2.5 : 3;
      const hz = Math.round(Math.min(Math.max(12, pxH/hzDiv), Math.max(12, 8 + Math.sqrt(pxW) * 2), maxHz));
      const s = k.poly[0].start, e = k.poly[k.poly.length-1].end;
      const fullLabelH = hz + 40;
      const isTall = pxH > 300;

      if (k.svgLabel) {
        // SVG label tracked by group fade (for short polys that can't be sticky)
        const sl = k.svgLabel;
        const slCx = (sl.x1 + sl.x2) / 2 * kScale;
        const slCy = (yPos(sl.start) + yPos(sl.end)) / 2;
        const slW = (sl.x2 - sl.x1) * kScale;
        const slHz = sl.hz || Math.round(Math.min(Math.max(12, slW / 3), 28));
        const g = document.createElementNS('http://www.w3.org/2000/svg','g');
        g.appendChild(svgEl('text', { x:slCx, y:slCy-8, fill:tc, class:'label-zh', 'font-size':slHz })).textContent = k.zh;
        g.appendChild(svgEl('text', { x:slCx, y:slCy+slHz/2+4, fill:tc, class:'label-en' })).textContent = k.name;
        g.appendChild(svgEl('text', { x:slCx, y:slCy+slHz/2+16, fill:tc, class:'label-dates' })).textContent = fmtYr(sl.start)+' – '+fmtYr(sl.end);
        svg.appendChild(g);
        // Register for group fade using a wrapper that controls the SVG group opacity
        const wrapper = { style: g.style, dataset: { hidden: '0' }, offsetHeight: (sl.end - sl.start) * scaleY };
        koreaStickyLabels.push({ el: wrapper, topPx: yPos(sl.start), botPx: yPos(sl.end), cx: slCx, group: k.group || null, aligned: false, noGroupFade: false, isSvgLabel: true });
      } else if (k.noLabel) {
        // shape-only, no label
      } else if (isTall && !k.noSticky && pxW > 25) {
        // ── Sticky HTML overlay label ──
        const allStarts = k.poly.map(p => p.start), allEnds = k.poly.map(p => p.end);
        const topPx = yPos(Math.min(...allStarts));
        const botPx = yPos(Math.max(...allEnds));
        const el = document.createElement('div');
        el.className = 'sticky-label';
        el.style.color = tc;
        el.style.left = (lp.x1 * kScale) + 'px';
        el.style.width = pxW + 'px';

        let inner = `<div class="sl-zh" style="font-size:${hz}px">${k.zh}</div>`;
        inner += `<div class="sl-en">${k.name}</div>`;
        if (k.sub) inner += `<div class="sl-sub">${k.sub}</div>`;
        inner += `<div class="sl-dates">${fmtYr(s)} – ${fmtYr(e)}</div>`;
        el.innerHTML = inner;

        koreaMapWrap.appendChild(el);
        koreaStickyLabels.push({ el, topPx, botPx, cx, group: k.group || null, aligned: false, noGroupFade: false });
      } else if (pxH > fullLabelH && pxW > 80) {
        svg.appendChild(svgEl('text', { x:cx, y:cy-8, fill:tc, class:'label-zh', 'font-size':hz })).textContent = k.zh;
        svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+4, fill:tc, class:'label-en' })).textContent = k.name;
        if (k.sub && pxH > fullLabelH + 14) svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+16, fill:tc, class:'label-sub' })).textContent = k.sub;
        svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+(k.sub && pxH>fullLabelH+14?26:16), fill:tc, class:'label-dates' })).textContent = fmtYr(s)+' – '+fmtYr(e);
      } else if (pxH > 28 && pxW > 28) {
        svg.appendChild(svgEl('text', { x:cx, y:cy, fill:tc, class:'label-zh', 'font-size':28 })).textContent = k.zh;
      }

      // Tooltip for noLabel entities (too small for text)
      if (k.noLabel && !k.svgLabel && k.name) {
        const p0 = phases[0];
        const tx1 = p0.x1 * kScale, tx2 = p0.x2 * kScale;
        const ty1 = yPos(p0.start), ty2 = yPos(p0.end);
        const tcx = (tx1 + tx2) / 2, tcy = (ty1 + ty2) / 2;
        const ttc = getContrast(k.color);
        const hitRect = svgEl('rect', { x:tx1, y:ty1, width:tx2-tx1, height:ty2-ty1, fill:'transparent', class:'kingdom-poly' });
        hitRect.dataset.koreaTooltipIdx = koreaTooltipData.length;
        koreaTooltipData.push({ name:k.name, zh:k.zh, sub:k.sub, color:k.color, tc:ttc, s:k.poly[0].start, e:k.poly[k.poly.length-1].end, cx:tcx, cy:tcy });
        svg.appendChild(hitRect);
      }
      // Strip: register tooltip for thin trailing strip
      if (k.labelRect && k.noSticky && phases.length > 1) {
        const strip = phases[phases.length - 1];
        const sx1 = strip.x1 * kScale, sx2 = strip.x2 * kScale;
        const sy1 = yPos(strip.start), sy2 = yPos(strip.end);
        const scx = (sx1 + sx2) / 2, scy = (sy1 + sy2) / 2;
        const stc = getContrast(k.color);
        const hitRect = svgEl('rect', { x:sx1, y:sy1, width:sx2-sx1, height:sy2-sy1, fill:'transparent', class:'kingdom-poly' });
        hitRect.dataset.koreaTooltipIdx = koreaTooltipData.length;
        koreaTooltipData.push({ name:k.name, zh:k.zh, sub:k.sub, color:k.color, tc:stc, s:k.poly[0].start, e:k.poly[k.poly.length-1].end, cx:scx, cy:scy });
        svg.appendChild(hitRect);
      }
    }
  });

  koreaMapWrap.appendChild(svg);

  // ── Grouped hover: highlight all polys with same name ──
  svg.querySelectorAll('[data-kname]').forEach(el => {
    el.addEventListener('mouseenter', () => {
      svg.querySelectorAll(`[data-kname="${el.dataset.kname}"]`).forEach(s => s.classList.add('k-hover'));
    });
    el.addEventListener('mouseleave', () => {
      svg.querySelectorAll('.k-hover').forEach(s => s.classList.remove('k-hover'));
    });
  });

  // ── Korea hover tooltips ──
  if (koreaTooltipEl) koreaTooltipEl.remove();
  if (koreaTooltipData.length > 0) {
    koreaTooltipEl = document.createElement('div');
    koreaTooltipEl.className = 'kingdom-tooltip';
    koreaMapWrap.appendChild(koreaTooltipEl);
    svg.querySelectorAll('[data-korea-tooltip-idx]').forEach(el => {
      const td = koreaTooltipData[parseInt(el.dataset.koreaTooltipIdx)];
      el.addEventListener('mouseenter', () => {
        koreaTooltipEl.style.background = td.color;
        koreaTooltipEl.style.color = td.tc;
        let html = `<div class="sl-zh">${td.zh}</div>`;
        html += `<div class="sl-en">${td.name}</div>`;
        if (td.sub) html += `<div class="sl-en" style="opacity:0.6">${td.sub}</div>`;
        html += `<div class="sl-dates">${fmtYr(td.s)} – ${fmtYr(td.e)}</div>`;
        koreaTooltipEl.innerHTML = html;
        const wr = koreaMapWrap.getBoundingClientRect();
        koreaTooltipEl.style.left = (wr.left + td.cx) + 'px';
        koreaTooltipEl.style.top = (wr.top + td.cy) + 'px';
        koreaTooltipEl.style.transform = 'translate(-50%, -50%)';
        koreaTooltipEl.classList.add('visible');
      });
      el.addEventListener('mouseleave', () => {
        koreaTooltipEl.classList.remove('visible');
      });
    });
  }
}

  const { mongolW: mW } = computeWidths();
  mongolPanel.style.width = mW + 'px';
  const svg = svgEl('svg', { width: mW, height: height });
  const mScale = mW / 100;

  const fc = Math.ceil(BASE_YEAR / 100) * 100;
  for (let y = fc; y <= END_YEAR; y += 100)
    svg.appendChild(svgEl('line', { x1:0, y1:yPos(y), x2:mW, y2:yPos(y), class:'grid-line century' }));

  mongolData.forEach((k, idx) => {
    const phases = k.poly;
    let d = "";
    for (let i = 0; i < phases.length; i++) {
      const x = phases[i].x1 * mScale;
      const yT = yPos(phases[i].start);
      const yB = yPos(phases[i].end);
      d += (i === 0 ? `M ${x} ${yT} ` : `L ${x} ${yT} `);
      d += `L ${x} ${yB} `;
    }
    for (let i = phases.length - 1; i >= 0; i--) {
      const x = phases[i].x2 * mScale;
      const yT = yPos(phases[i].start);
      const yB = yPos(phases[i].end);
      d += `L ${x} ${yB} L ${x} ${yT} `;
    }
    d += "Z";

    const path = svgEl('path', { d, fill: k.color, stroke: k.color, class:'kingdom-poly', 'data-idx': 'm'+idx });
    if (k.name) path.dataset.kname = k.name;
    svg.appendChild(path);

    const lp = k.labelRect || phases[0];
    const pxW = (lp.x2 - lp.x1) * mScale;
    const pxH = (lp.end - lp.start) * scaleY;
    const cx = (lp.x1 + lp.x2) / 2 * mScale;
    const cy = (yPos(lp.start) + yPos(lp.end)) / 2;
    const tc = getContrast(k.color);
    const maxHz = pxW > 300 ? 42 : pxW > 200 ? 36 : 28;
    const hzDiv = pxW > 200 ? 2.5 : 3;
    const hz = Math.round(Math.min(Math.max(12, pxH/hzDiv), Math.max(12, 8 + Math.sqrt(pxW) * 2), maxHz));
    const s = k.poly[0].start, e = k.poly[k.poly.length-1].end;
    const fullLabelH = hz + 40;
    const isTall = pxH > 300;

    if (isTall && !k.noSticky && pxW > 25) {
      const allStarts = k.poly.map(p => p.start), allEnds = k.poly.map(p => p.end);
      const topPx = yPos(Math.min(...allStarts));
      const botPx = yPos(Math.max(...allEnds));
      const el = document.createElement('div');
      el.className = 'sticky-label';
      el.style.color = tc;
      el.style.left = (lp.x1 * mScale) + 'px';
      el.style.width = pxW + 'px';
      let inner = `<div class="sl-zh" style="font-size:${hz}px">${k.zh}</div>`;
      inner += `<div class="sl-en">${k.name}</div>`;
      if (k.sub) inner += `<div class="sl-sub">${k.sub}</div>`;
      inner += `<div class="sl-dates">${fmtYr(s)} – ${fmtYr(e)}</div>`;
      el.innerHTML = inner;
      mongolMapWrap.appendChild(el);
      mongolStickyLabels.push({ el, topPx, botPx, cx, group: k.group || null, aligned: false, noGroupFade: false });
    } else if (pxH > fullLabelH && pxW > 80) {
      svg.appendChild(svgEl('text', { x:cx, y:cy-8, fill:tc, class:'label-zh', 'font-size':hz })).textContent = k.zh;
      svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+4, fill:tc, class:'label-en' })).textContent = k.name;
      if (k.sub && pxH > fullLabelH + 14) svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+16, fill:tc, class:'label-sub' })).textContent = k.sub;
      svg.appendChild(svgEl('text', { x:cx, y:cy+hz/2+(k.sub && pxH>fullLabelH+14?26:16), fill:tc, class:'label-dates' })).textContent = fmtYr(s)+' – '+fmtYr(e);
    } else if (pxH > 28 && pxW > 28) {
      svg.appendChild(svgEl('text', { x:cx, y:cy, fill:tc, class:'label-zh', 'font-size':28 })).textContent = k.zh;
    }
  });

  mongolMapWrap.appendChild(svg);
}
