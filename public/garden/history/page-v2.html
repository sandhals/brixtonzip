<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>East Asian History Timeline v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f2ed;
    font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
    color: #1a1a1a;
    overflow-x: auto;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sticky header ── */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 200;
    background: rgba(244,242,237,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    padding: 10px 24px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .sticky-header h1 {
    font-size: 0.85rem; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: #444;
  }
  .year-indicator { font-size: 0.8rem; color: #999; font-variant-numeric: tabular-nums; }
  .scale-control { display: flex; align-items: center; gap: 6px; margin-left: 12px; }
  .scale-control label { font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap; }
  .scale-control input[type="range"] {
    width: 80px; height: 3px; -webkit-appearance: none; appearance: none;
    background: rgba(0,0,0,0.1); border-radius: 2px; outline: none; cursor: pointer;
  }
  .scale-control input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: #888; cursor: pointer;
  }
  .scale-value { font-size: 0.6rem; color: #aaa; font-variant-numeric: tabular-nums; min-width: 28px; }
  .period-indicator { font-size: 0.7rem; color: #aaa; letter-spacing: 0.05em; margin-left: auto; }

  /* ── Date cursor ── */
  .date-cursor {
    position: fixed; left: 24px; top: 50%; transform: translateY(-50%);
    z-index: 150; display: flex; align-items: center; gap: 4px; pointer-events: auto;
  }
  .date-cursor .arrow {
    width: 0; height: 0;
    border-top: 5px solid transparent; border-bottom: 5px solid transparent;
    border-left: 7px solid #a88050;
  }
  .date-cursor .cursor-year { font-size: 0.6rem; font-weight: 600; color: #a88050; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .date-crosshair {
    position: fixed; top: 50%; left: 0; right: 0; height: 1px;
    background: rgba(168,128,80,0.35); pointer-events: none; z-index: 100;
    opacity: 0; transition: opacity 0.15s;
  }
  .date-crosshair.visible { opacity: 1; }

  /* ── Timeline layout ── */
  .timeline-layout {
    display: flex;
    padding: 0 24px 80px;
    min-width: fit-content;
  }

  /* ══════════════════════════════════════════════════════
     KEY ARCHITECTURAL CHANGE: All vertical positioning
     is driven by the CSS custom property --px.
     Changing --px on .timeline-layout rescales EVERYTHING
     with zero JS loops.
     ══════════════════════════════════════════════════════ */

  .year-axis {
    width: 74px;
    flex-shrink: 0;
    position: relative;
  }

  .year-marker {
    position: absolute;
    right: 8px;
    top: calc(var(--offset) * var(--px) * 1px);
    font-size: 0.65rem;
    color: #c0bdb6;
    transform: translateY(-50%);
    font-variant-numeric: tabular-nums;
    user-select: none;
    white-space: nowrap;
    padding: 2px 4px;
    cursor: default;
  }
  .year-marker.century { color: #908a80; font-weight: 500; }
  .year-marker.event-yr { color: #a88050; font-weight: 500; font-size: 0.6rem; }
  .year-marker.hover-reveal { opacity: 1 !important; pointer-events: auto !important; }

  .grid {
    position: relative;
    width: calc(var(--cols) * var(--col-w) * 1px + (var(--cols) - 1) * var(--gap) * 1px);
    height: calc(var(--rows) * var(--px) * 1px);
  }

  /* ── Gridlines — also CSS-var driven ── */
  .hline {
    position: absolute;
    left: 0; right: 0; height: 1px;
    top: calc(var(--offset) * var(--px) * 1px);
    pointer-events: none; z-index: 3;
  }
  .hline.regular { background: rgba(0,0,0,0.03); }
  .hline.century-line { background: rgba(0,0,0,0.06); }
  .hline.event-line { border-top: 1px dashed rgba(0,0,0,0.06); height: 0; }

  /* ── Entities — all absolutely positioned via CSS vars ── */
  .entity {
    position: absolute;
    top:    calc(var(--ys) * var(--px) * 1px);
    height: calc(var(--yh) * var(--px) * 1px);
    left:   calc(var(--c) * (var(--col-w) * 1px + var(--gap) * 1px));
    width:  calc(var(--w) * var(--col-w) * 1px + (var(--w) - 1) * var(--gap) * 1px);
    border-radius: 3px;
    overflow: hidden;
    cursor: default;
    z-index: 2;
    transition: opacity 0.2s;
    min-width: 0;
  }
  .entity.fill { z-index: 1; }
  .entity.fill .entity-inner { display: none; }

  .entity-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px 4px;
    gap: 2px;
    width: 100%;
    height: 100%;
    overflow: hidden;
    transition: opacity 0.2s;
  }

  .entity.tall .entity-inner {
    position: absolute;
    left: 0; right: 0;
    height: auto;
    justify-content: flex-start;
  }

  .e-name {
    font-size: 0.55rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em;
    line-height: 1.3; opacity: 0.85;
  }
  .e-sub { font-size: 0.5rem; opacity: 0.6; line-height: 1.2; }
  .e-hanzi { font-weight: 700; line-height: 1.1; }
  .e-dates { font-size: 0.5rem; opacity: 0.5; font-variant-numeric: tabular-nums; margin-top: 2px; }

  /* ── Groups: bleed into each other ── */
  .entity[data-group] {
    border: none; border-radius: 0; box-shadow: none; z-index: 3;
  }

  /* ── Group background spans (bridge column gaps) ── */
  .group-bg {
    position: absolute;
    top:    calc(var(--ys) * var(--px) * 1px);
    height: calc(var(--yh) * var(--px) * 1px);
    /* left/width set inline since they depend on column math */
    z-index: 0;
    pointer-events: none;
  }

  /* ── Hover: fade non-highlighted ── */
  .grid.has-date-highlight .entity:not(.date-highlight) { opacity: 0.55; }

  /* ── Period column ── */
  .period-col {
    width: 28px; flex-shrink: 0;
    position: relative; margin-left: 8px;
  }
  .period-label {
    position: absolute;
    top:    calc(var(--ys) * var(--px) * 1px + 8px);
    height: calc(max(40px, var(--yh) * var(--px) * 1px - 16px));
    writing-mode: vertical-rl; text-orientation: mixed;
    font-size: 0.58rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(0,0,0,0.12);
    font-weight: 700; user-select: none; left: 0;
  }
  .period-label .hanzi {
    display: block; margin-top: 8px;
    font-size: 0.72rem; letter-spacing: 0.12em;
  }

  .intro { padding: 24px 24px 16px; max-width: 720px; }
  .intro h2 { font-size: 1rem; font-weight: 500; margin-bottom: 4px; }
  .intro .range { font-size: 0.75rem; color: #999; margin-bottom: 8px; }
  .intro .note { font-size: 0.75rem; color: #aaa; line-height: 1.5; }
</style>
</head>
<body>

<header class="sticky-header">
  <h1>East Asian History</h1>
  <span class="year-indicator" id="yearIndicator">2070 BCE</span>
  <div class="scale-control">
    <label>Scale</label>
    <input type="range" id="scaleSlider" min="0.1" max="1" step="0.01" value="1">
    <span class="scale-value" id="scaleValue">4.0 px/yr</span>
  </div>
  <span class="period-indicator" id="periodIndicator"></span>
</header>

<div class="intro">
  <h2>China: Xia Dynasty through Liu Song</h2>
  <div class="range">2070 BCE – 480 CE</div>
  <div class="note">Scroll down to move forward in time.</div>
</div>

<div class="date-cursor" id="dateCursor">
  <div class="arrow"></div>
  <div class="cursor-year" id="cursorYear"></div>
</div>
<div class="date-crosshair" id="dateCrosshair"></div>

<main>
  <div class="timeline-layout" id="timeline"
       style="--px:4; --col-w:70; --gap:3; --cols:13; --rows:2550">
    <div class="year-axis" id="yearAxis"></div>
    <div class="grid" id="grid"></div>
    <div class="period-col" id="periodCol"></div>
  </div>
</main>

<script>
// ═══════════════════════════════════════════════════════════════
//  ARCHITECTURE v2
//
//  Pain points solved:
//  1. RESCALING: All positioning uses CSS calc(var(--px) * ...).
//     Changing --px on the container rescales everything instantly.
//     No JS loops over positioned elements.
//
//  2. FILL BLOCKS: Auto-generated from entity data. Define only
//     real kingdoms — gaps are filled automatically.
//
//  3. GROUPS: Declared in data, rendered as merged background
//     shapes once. CSS vars handle repositioning.
//
//  4. LABELS: Single updateLabels() function re-evaluates all
//     entity display modes based on current --px value.
//
//  5. ADDING DATA: Just add to the ENTITIES array with
//     { n, h, s, e, c, w, bg, fg }. No fill math needed.
// ═══════════════════════════════════════════════════════════════

// ── Config ──
const Y0   = 2070;   // top of timeline (BCE)
const Y1   = -480;   // bottom (480 CE)
const ROWS = Y0 - Y1;
const COLS = 13;
const COL_W = 70;
const GAP   = 3;
let   PX    = 4;      // current px/year — also in CSS --px

const fmtYr = y => y > 0 ? y + ' BCE' : Math.abs(y) + ' CE';
// Year offset from top (for CSS --offset and --ys)
const yOff = y => Y0 - y;

// ── Colors ──
const C = {
  xia:'#5b8cb8', shang:'#4878a0', wzhou:'#c83838',
  qin:'#5c2d7e', wu:'#b8b8b0', yue:'#c4ac6c', chu:'#7084b4',
  jin:'#d48a3c', wei:'#d8ccc0', han:'#7cb0d8', zhao:'#d8cc40',
  yan:'#806090', song:'#c05858', qiJ:'#a8c8d8', qiT:'#586830',
  ezhou:'#cc7828', qinD:'#5c2d7e', wchu:'#8c3060', whan:'#c83838',
  xin:'#2a2a2a', ehan:'#2a7848',
  caowei:'#c8a882', shuhan:'#6898b8', ewu:'#7eaab8',
  wjin:'#b8c8d8', ejin:'#8cacc8',
  fLiang:'#c8b888', lZhao:'#d8c490', fZhao:'#c0a070',
  fYan:'#9888a8', fQin:'#c8a898', lQin:'#d0c0a8',
  lYan:'#c898a8', wQin:'#a8b888', sLiang:'#d8a8c0',
  lLiang:'#b0a0c8', nYan:'#b8b0c8', huxia:'#d8d040',
  wLiang:'#98c898', nLiang:'#c8c878', sYan:'#d0b8c0',
  chHan:'#d05030', lSong:'#8898c8', nWei:'#c0c8d8',
};
const D = '#1a1a1a', L = '#f8f8f6';

// ═══════════════════════════════════════════════════════════════
//  ENTITY DATA
//
//  Each entity: { n, h, s, e, c, w, bg, fg, sub?, group? }
//    n:  English name
//    h:  Hanzi
//    s:  start year (positive=BCE, negative=CE)
//    e:  end year
//    c:  column (1-indexed)
//    w:  column span
//    bg: background color
//    fg: text color
//    sub:   subtitle (optional)
//    group: group id for visual merging (optional)
//
//  FILL BLOCKS are generated automatically — you only need to
//  define the "real" entities here. The autoFill() function
//  scans for gaps and fills them with the nearest entity's color.
// ═══════════════════════════════════════════════════════════════

const ENTITIES = [
  // ═══ Early unified dynasties ═══
  { n:'XIA DYNASTY',     h:'夏朝', s:2070, e:1600, c:1, w:13, bg:C.xia,   fg:L },
  { n:'SHANG DYNASTY',   h:'商朝', s:1600, e:1046, c:1, w:13, bg:C.shang, fg:L },
  { n:'WESTERN ZHOU',    h:'西周', s:1046, e:770,  c:1, w:13, bg:C.wzhou,  fg:L },

  // ═══ Spring & Autumn / Warring States ═══

  { n:'YUE',    h:'越',   s:473, e:306, c:2,  w:2,  bg:C.yue,  fg:D, group:'yue' },
  { n:'CHU',    h:'楚',   s:770, e:306, c:4,  w:2,  bg:C.chu,  fg:L, group:'chu' },
  { n:'CHU',    h:'楚',   s:306, e:223, c:2,  w:4,  bg:C.chu,  fg:L, group:'chu' },
  { n:'JIN',    h:'晉',   s:770, e:403, c:6,  w:3,  bg:C.jin,  fg:D },
  { n:'WEI',    h:'魏',   s:403, e:225, c:6,  w:1,  bg:C.wei,  fg:D },
  { n:'HAN',    h:'韓',   s:403, e:230, c:7,  w:1,  bg:C.han,  fg:D },
  { n:'ZHAO',   h:'趙',   s:403, e:222, c:8,  w:1,  bg:C.zhao, fg:D },
  { n:'YAN',    h:'燕',   s:770, e:222, c:9,  w:1,  bg:C.yan,  fg:L },
  { n:'SONG',   h:'宋',   s:770, e:286, c:10, w:1,  bg:C.song, fg:L },
  { n:'QI',     h:'姜齊', s:770, e:386, c:11, w:1,  bg:C.qiJ,  fg:D, sub:'House of Jiang', group:'qi' },
  { n:'QI',     h:'田齊', s:386, e:286, c:11, w:1,  bg:C.qiT,  fg:L, sub:'House of Tian', group:'qi' },
  { n:'QI',     h:'田齊', s:286, e:221, c:10, w:2,  bg:C.qiT,  fg:L, sub:'House of Tian', group:'qi' },
  { n:'LU',     h:'魯',   s:770, e:256, c:12, w:1,  bg:'#b89870', fg:D },
  { n:'EASTERN ZHOU', h:'東周', s:770, e:256, c:13, w:1, bg:C.ezhou, fg:L },

  // ═══ Qin Dynasty ═══
  { n:'QIN DYNASTY', h:'秦朝', s:221, e:206, c:1, w:13, bg:C.qinD, fg:L, sub:'Unified China', group:'qin' },

  // ═══ Han era ═══
  { n:'WESTERN CHU', h:'西楚', s:206, e:202, c:1, w:13, bg:C.wchu, fg:L, sub:'Chu–Han Contention' },
  { n:'WESTERN HAN', h:'西漢', s:202, e:-9,  c:1, w:13, bg:C.whan, fg:L },
  { n:'XIN DYNASTY', h:'新朝', s:-9,  e:-23, c:1, w:13, bg:C.xin,  fg:L, sub:'Wang Mang' },
  { n:'GENGSHI',     h:'更始', s:-23, e:-25, c:1, w:13, bg:C.whan, fg:L, sub:'Restored Han' },
  { n:'EASTERN HAN', h:'東漢', s:-25, e:-220, c:1, w:13, bg:C.ehan, fg:L },

  // ═══ Three Kingdoms ═══
  { n:'CAO WEI',    h:'曹魏', s:-220, e:-265, c:4, w:6,  bg:C.caowei, fg:D },
  { n:'SHU HAN',    h:'蜀漢', s:-221, e:-263, c:1, w:3,  bg:C.shuhan, fg:L },
  { n:'EASTERN WU', h:'東吳', s:-229, e:-280, c:10, w:4, bg:C.ewu,    fg:D },

  // ═══ Western Jin ═══
  { n:'WESTERN JIN', h:'西晉', s:-265, e:-280, c:1,  w:9,  bg:C.wjin, fg:D, group:'jin2' },
  { n:'WESTERN JIN', h:'西晉', s:-280, e:-304, c:1,  w:13, bg:C.wjin, fg:D, group:'jin2' },

  // ═══════════════════════════════════════════════════════════════
  //  SIXTEEN KINGDOMS (304–439 CE)
  //
  //  9 northern columns (c:1–9) + 4 southern columns (c:10–13)
  //
  //  Column chains (time-compatible sequences):
  //    C1: F.Liang(316-376) → W.Liang(400-421)
  //    C2: F.Zhao(304-329) → L.Zhao(319-351) → S.Liang(397-414)
  //    C3: F.Qin(351-384) → L.Qin(384-417)
  //    C4: F.Yan(337-370) → L.Liang(386-403) → Xia(407-431)
  //    C5: L.Yan(384-407) → N.Yan(407-436)
  //    C6: W.Qin(385-400) → W.Qin restored(409-431)
  //    C7: S.Yan(398-410)
  //    C8: N.Liang(397-439)
  //    C9: N.Wei(386-480+)
  //
  //  South:
  //    C10-11: Cheng Han(304-347)
  //    C12-13: E.Jin(317-347) → E.Jin(347-420, c:10-13) → Liu Song(420-480)
  // ═══════════════════════════════════════════════════════════════

  // ── Southern states ──
  { n:'CHENG HAN',   h:'成漢', s:-304, e:-347, c:10, w:2, bg:C.chHan, fg:L },
  { n:'EASTERN JIN', h:'東晉', s:-317, e:-347, c:12, w:2, bg:C.ejin,  fg:D, group:'ejin' },
  { n:'EASTERN JIN', h:'東晉', s:-347, e:-420, c:10, w:4, bg:C.ejin,  fg:D, group:'ejin' },
  { n:'SONG',        h:'宋',   s:-420, e:-480, c:10, w:4, bg:C.lSong, fg:L, sub:'Liu Song' },

  // ── C1: Former Liang → Western Liang ──
  { n:'FORMER LIANG',  h:'前涼', s:-314, e:-376, c:1, w:1, bg:C.fLiang, fg:D },

  // ── C3–4: Former Qin (expanding) → Later Qin ──
  { n:'FORMER QIN', h:'前秦', s:-351, e:-370, c:3, w:2, bg:C.fQin, fg:D, group:'fqin' },
  { n:'FORMER QIN', h:'前秦', s:-370, e:-376, c:3, w:4, bg:C.fQin, fg:D, group:'fqin' },
  { n:'FORMER QIN', h:'前秦', s:-376, e:-384, c:1, w:7, bg:C.fQin, fg:D, group:'fqin' },
  { n:'LATER QIN',  h:'後秦', s:-384, e:-417, c:3, w:1, bg:C.lQin, fg:D },

  // ── C4: Later Liang → Xia ──
  { n:'LATER LIANG', h:'後涼', s:-386, e:-403, c:4, w:1, bg:C.lLiang, fg:L },
  { n:'XIA',         h:'胡夏', s:-407, e:-431, c:4, w:1, bg:C.huxia,  fg:D },

  // ── C5–6: Former Yan → Later Yan → Northern Yan ──
  { n:'FORMER YAN',    h:'前燕', s:-337, e:-370, c:5, w:2, bg:C.fYan,   fg:L },
  { n:'LATER YAN',     h:'後燕', s:-384, e:-407, c:5, w:1, bg:C.lYan,   fg:D },
  { n:'NORTHERN YAN',  h:'北燕', s:-407, e:-436, c:5, w:1, bg:C.nYan,   fg:D },

  // ── C6: Southern Yan ──
  { n:'SOUTHERN YAN', h:'南燕', s:-398, e:-410, c:6, w:1, bg:C.sYan, fg:D },

  // ── C7: Western Qin → W.Qin restored ──
  { n:'WESTERN QIN', h:'西秦', s:-385, e:-400, c:7, w:1, bg:C.wQin, fg:D, group:'wqin' },
  { n:'WESTERN QIN', h:'西秦', s:-409, e:-431, c:7, w:1, bg:C.wQin, fg:D, group:'wqin', sub:'Restored' },

  // ── C8: Northern Liang ──
  { n:'NORTHERN LIANG', h:'北涼', s:-397, e:-439, c:8, w:1, bg:C.nLiang, fg:D },

  // ── C9: Northern Wei ──
  { n:'NORTHERN WEI', h:'北魏', s:-386, e:-480, c:9, w:1, bg:C.nWei, fg:D, group:'nwei' },

// ═══════════════════════════════════════════════════════════════
//  AUTO-FILL: Scan the grid for empty cells and fill them.
//
//  Strategy: for each empty cell, look at the entity directly
//  above it in the same column and inherit its color + group.
//  This replaces 30+ manual fill entries.
// ═══════════════════════════════════════════════════════════════

function autoFill(entities) {
  // Build occupancy grid: for each year × column, what entity covers it?
  // Use sparse approach — only check gaps between known entities

  // First, collect all year boundaries per column
  const colRanges = {}; // col → sorted array of { y, entering, ent }
  entities.forEach(ent => {
    for (let col = ent.c; col < ent.c + ent.w; col++) {
      if (!colRanges[col]) colRanges[col] = [];
      colRanges[col].push({ y: ent.s, start: true, ent });
      colRanges[col].push({ y: ent.e, start: false, ent });
    }
  });

  const fills = [];

  // For each column, find gaps
  for (let col = 1; col <= COLS; col++) {
    if (!colRanges[col]) {
      // Entire column is empty — shouldn't happen but handle it
      continue;
    }

    // Get all entities in this column, sorted by start year (descending = top to bottom)
    const colEnts = entities
      .filter(e => col >= e.c && col < e.c + e.w)
      .sort((a, b) => b.s - a.s); // top first

    // Walk from Y0 to Y1, find gaps
    let cursor = Y0;
    for (const ent of colEnts) {
      if (cursor > ent.s) {
        // Gap from cursor down to ent.s
        // Find the entity above this gap to inherit its color
        const above = colEnts.find(e => e.e >= cursor || e.s >= cursor);
        const below = ent;
        const fillBg = below.bg;
        const fillGroup = below.group;

        if (cursor > ent.s) {
          fills.push({
            n: below.n, h: below.h,
            s: cursor, e: ent.s,
            c: col, w: 1,
            bg: fillBg, fg: below.fg,
            _fill: true,
            group: fillGroup,
          });
        }
      }
      cursor = Math.min(cursor, ent.e);
    }

    // Gap at the bottom?
    if (cursor > Y1) {
      // Find the last entity in this column
      const last = colEnts[colEnts.length - 1];
      if (last) {
        fills.push({
          n: last.n, h: last.h,
          s: cursor, e: Y1,
          c: col, w: 1,
          bg: last.bg, fg: last.fg,
          _fill: true,
          group: last.group,
        });
      }
    }
  }

  // Pass 1: Merge vertically (same column, continuous time, same color)
  const vmerged = [];
  fills.sort((a, b) => a.c - b.c || b.s - a.s);
  for (const f of fills) {
    const prev = vmerged[vmerged.length - 1];
    if (prev && prev.c === f.c && prev.e === f.s && prev.bg === f.bg && prev.group === f.group) {
      prev.e = f.e;
    } else {
      vmerged.push({ ...f });
    }
  }

  // Pass 2: Merge horizontally (adjacent columns, same time range, same color)
  // Group by time range + color, then merge adjacent columns into wider blocks
  const hmerged = [];
  const byKey = {};
  vmerged.forEach(f => {
    const key = `${f.s}|${f.e}|${f.bg}|${f.group || ''}`;
    if (!byKey[key]) byKey[key] = [];
    byKey[key].push(f);
  });

  for (const fills of Object.values(byKey)) {
    // Sort by column
    fills.sort((a, b) => a.c - b.c);
    let cur = { ...fills[0] };
    for (let i = 1; i < fills.length; i++) {
      const f = fills[i];
      if (f.c === cur.c + cur.w) {
        // Adjacent column — merge by extending width
        cur.w += f.w;
      } else {
        hmerged.push(cur);
        cur = { ...f };
      }
    }
    hmerged.push(cur);
  }

  return hmerged;
}

// ═══════════════════════════════════════════════════════════════
//  PERIODS & EVENTS
// ═══════════════════════════════════════════════════════════════

const PERIODS = [
  { s:2070, e:1600, name:'Xia Dynasty',             hanzi:'夏朝' },
  { s:1600, e:1046, name:'Shang Dynasty',            hanzi:'商朝' },
  { s:1046, e:770,  name:'Western Zhou',             hanzi:'西周' },
  { s:770,  e:476,  name:'Spring and Autumn Period', hanzi:'春秋時代' },
  { s:475,  e:221,  name:'Warring States Period',    hanzi:'戰國時代' },
  { s:221,  e:206,  name:'Qin Dynasty',              hanzi:'秦朝' },
  { s:206,  e:202,  name:'Chu–Han Contention',       hanzi:'楚漢之爭' },
  { s:202,  e:-9,   name:'Western Han',              hanzi:'西漢' },
  { s:-9,   e:-23,  name:'Xin Dynasty',              hanzi:'新朝' },
  { s:-25,  e:-220, name:'Eastern Han',              hanzi:'東漢' },
  { s:-220, e:-280, name:'Three Kingdoms',           hanzi:'三國' },
  { s:-265, e:-316, name:'Western Jin',              hanzi:'西晉' },
  { s:-304, e:-439, name:'Sixteen Kingdoms',         hanzi:'五胡十六國' },
  { s:-317, e:-420, name:'Eastern Jin',              hanzi:'東晉' },
  { s:-420, e:-479, name:'Liu Song',                 hanzi:'劉宋' },
];

const EVENTS = [
  1600, 1046, 770, 473, 403, 386, 306, 286, 256, 230, 225, 223, 222, 221,
  206, 202, -9, -23, -25, -220, -221, -229, -263, -265, -280, -304, -314,
  -317, -329, -337, -347, -351, -370, -376, -384, -385, -386, -397, -398,
  -400, -403, -407, -409, -410, -414, -417, -420, -421, -431, -436, -439, -479,
];

// ═══════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════

const timeline  = document.getElementById('timeline');
const grid      = document.getElementById('grid');
const yearAxis  = document.getElementById('yearAxis');
const periodCol = document.getElementById('periodCol');

// Generate fills
const fillBlocks = autoFill(ENTITIES);
const ALL = [...ENTITIES.map(e => ({ ...e, _fill: false })), ...fillBlocks];

// ── Gridlines ──
for (let y = 2050; y >= Y1; y -= 50) {
  const el = document.createElement('div');
  el.className = 'hline ' + (y % 100 === 0 ? 'century-line' : 'regular');
  el.style.setProperty('--offset', yOff(y));
  grid.appendChild(el);
}
EVENTS.forEach(y => {
  const el = document.createElement('div');
  el.className = 'hline event-line';
  el.style.setProperty('--offset', yOff(y));
  grid.appendChild(el);
});

// ── Year markers ──
const MIN_GAP = 16;
const markerData = [];
for (let y = 2050; y >= Y1; y -= 50) {
  markerData.push({ y, cls: y % 100 === 0 ? 'century' : '', pri: y % 100 === 0 ? 2 : 1 });
}
EVENTS.forEach(y => {
  markerData.push({ y, cls: 'event-yr', pri: 0 });
});
markerData.sort((a, b) => b.pri - a.pri || (Y0 - a.y) - (Y0 - b.y));

const placed = [];
const markerEls = {}; // year → [marker elements]

markerData.forEach(m => {
  const px = yOff(m.y) * PX;
  const tooClose = placed.some(p => Math.abs(px - p) < MIN_GAP);
  const mk = document.createElement('div');
  mk.className = 'year-marker ' + m.cls;
  mk.style.setProperty('--offset', yOff(m.y));
  mk.textContent = fmtYr(m.y);
  mk.dataset.markerY = m.y;
  if (tooClose) { mk.style.opacity = '0'; mk.style.pointerEvents = 'none'; }
  yearAxis.appendChild(mk);
  if (!markerEls[m.y]) markerEls[m.y] = [];
  markerEls[m.y].push(mk);
  if (!tooClose) placed.push(px);
});

// ── Period labels ──
PERIODS.forEach(p => {
  const el = document.createElement('div');
  el.className = 'period-label';
  el.style.setProperty('--ys', yOff(p.s));
  el.style.setProperty('--yh', p.s - p.e);
  el.innerHTML = `${p.name}<span class="hanzi">${p.hanzi}</span>`;
  periodCol.appendChild(el);
});

// ── Entity elements ──
const entityEls = []; // { el, ent } for label updates

ALL.forEach(ent => {
  const el = document.createElement('div');
  el.className = 'entity' + (ent._fill ? ' fill' : '');

  // CSS custom properties for positioning — this is the key!
  el.style.setProperty('--ys', yOff(ent.s));
  el.style.setProperty('--yh', ent.s - ent.e);
  el.style.setProperty('--c', ent.c - 1);  // 0-indexed for CSS calc
  el.style.setProperty('--w', ent.w);
  el.style.background = ent.bg;
  el.style.color = ent.fg;

  if (ent.group) { el.dataset.group = ent.group; el.dataset.span = ent.w; }
  el.dataset.start = ent.s;
  el.dataset.end = ent.e;

  // Tooltip (always)
  const years = ent.s - ent.e;
  let tip = `${ent.n} ${ent.h}`;
  if (ent.sub) tip += ` (${ent.sub})`;
  tip += `\n${fmtYr(ent.s)}–${fmtYr(ent.e)} (${years} yrs)`;
  el.title = tip;

  grid.appendChild(el);
  if (!ent._fill) entityEls.push({ el, ent });
});

// ── Group backgrounds (bridge column gaps) ──
const groupEnts = {};
ENTITIES.forEach(ent => {
  if (!ent.group) return;
  if (!groupEnts[ent.group]) groupEnts[ent.group] = [];
  groupEnts[ent.group].push(ent);
});
// Also include fills that have groups
fillBlocks.forEach(f => {
  if (!f.group) return;
  if (!groupEnts[f.group]) groupEnts[f.group] = [];
  groupEnts[f.group].push(f);
});

for (const [g, ents] of Object.entries(groupEnts)) {
  const bg = ents[0].bg;
  const allS = Math.min(...ents.map(e => e.s));
  const allE = Math.max(...ents.map(e => e.e));

  let spans = [];
  let curSpan = null;

  for (let y = allS; y > allE; y--) {
    const covering = ents.filter(e => y <= e.s && y > e.e);
    if (covering.length === 0) { curSpan = null; continue; }
    const cMin = Math.min(...covering.map(e => e.c));
    const cMax = Math.max(...covering.map(e => e.c + e.w));

    if (curSpan && curSpan.cMin === cMin && curSpan.cMax === cMax) {
      curSpan.e = y - 1;
    } else {
      curSpan = { s: y, e: y - 1, cMin, cMax };
      spans.push(curSpan);
    }
  }

  spans.forEach(sp => {
    if (sp.cMax - sp.cMin <= 1) return;
    const el = document.createElement('div');
    el.className = 'group-bg';
    el.style.setProperty('--ys', yOff(sp.s));
    el.style.setProperty('--yh', sp.s - sp.e);
    const left = (sp.cMin - 1) * (COL_W + GAP);
    const right = (sp.cMax - 1) * (COL_W + GAP) - GAP;
    el.style.left = left + 'px';
    el.style.width = (right - left) + 'px';
    el.style.background = bg;
    grid.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════════════════
//  ADAPTIVE LABELS
//
//  Called on init and on scale change. Evaluates each entity's
//  pixel height at the current PX and picks the right display
//  mode. Rebuilds tallEntities/groupMap for scroll positioning.
// ═══════════════════════════════════════════════════════════════

const tallEntities = [];
const groupMap = {};

function updateLabels() {
  tallEntities.length = 0;
  for (const k in groupMap) delete groupMap[k];

  entityEls.forEach(({ el, ent }) => {
    const years = ent.s - ent.e;
    const pxH = years * PX;
    const pxW = ent.w * COL_W + (ent.w - 1) * GAP;

    el.classList.remove('tall', 'compact', 'fill');

    if (pxH < 6) {
      el.classList.add('fill');
      el.innerHTML = '';
      return;
    }

    const hanziSize = Math.round(Math.min(Math.max(10, pxH / 4), Math.max(10, pxW * 0.45), 56));
    const isTall = pxH > 200;
    if (isTall) el.classList.add('tall');

    if (pxH > 80) {
      let inner = `<div class="e-name">${ent.n}</div>`;
      if (ent.sub) inner += `<div class="e-sub">${ent.sub}</div>`;
      inner += `<div class="e-hanzi" style="font-size:${hanziSize}px">${ent.h}</div>`;
      inner += `<div class="e-dates">${fmtYr(ent.s)}–${fmtYr(ent.e)}</div>`;
      el.innerHTML = `<div class="entity-inner">${inner}</div>`;
    } else if (pxH > 32) {
      const sz = Math.min(hanziSize, 20);
      el.innerHTML = `<div class="entity-inner">
        <div class="e-hanzi" style="font-size:${sz}px">${ent.h}</div>
        <div class="e-name">${ent.n}</div>
      </div>`;
    } else if (pxH > 16) {
      el.classList.add('compact');
      const sz = Math.min(hanziSize, 14);
      el.innerHTML = `<div class="entity-inner" style="flex-direction:row;gap:4px;padding:1px 6px;justify-content:center;align-items:center;">
        <div class="e-hanzi" style="font-size:${sz}px;line-height:1">${ent.h}</div>
        <div class="e-name" style="font-size:0.45rem;line-height:1">${ent.n}</div>
      </div>`;
    } else if (pxH > 8) {
      el.classList.add('compact');
      const sz = Math.min(10, pxH - 2);
      el.innerHTML = `<div class="entity-inner" style="padding:0 4px;justify-content:center;align-items:center;">
        <div class="e-hanzi" style="font-size:${sz}px;line-height:1">${ent.h}</div>
      </div>`;
    } else {
      el.classList.add('fill');
      el.innerHTML = '';
    }

    // Collect tall entities + group map
    if (isTall) {
      const inner = el.querySelector('.entity-inner');
      if (inner) tallEntities.push({ el, inner });
    }
    if (ent.group) {
      const inner = el.querySelector('.entity-inner');
      if (inner) {
        if (!groupMap[ent.group]) groupMap[ent.group] = [];
        groupMap[ent.group].push({ el, inner });
      }
    }
  });
}

updateLabels();

// ═══════════════════════════════════════════════════════════════
//  HOVER: entity ↔ year marker interaction
// ═══════════════════════════════════════════════════════════════

const allEntities = grid.querySelectorAll('.entity');

// Entity hover → reveal associated year markers
let activeHoverMarkers = [];
allEntities.forEach(el => {
  el.addEventListener('mouseenter', () => {
    const s = parseInt(el.dataset.start);
    const e = parseInt(el.dataset.end);
    activeHoverMarkers.forEach(mk => mk.classList.remove('hover-reveal'));
    activeHoverMarkers = [];

    const visiblePxs = [];
    yearAxis.querySelectorAll('.year-marker').forEach(mk => {
      if (mk.style.opacity !== '0' && !mk.classList.contains('hover-reveal')) {
        visiblePxs.push(yOff(parseInt(mk.dataset.markerY)) * PX);
      }
    });

    [s, e].forEach(y => {
      if (!markerEls[y]) return;
      markerEls[y].forEach(mk => {
        const px = yOff(y) * PX;
        if (visiblePxs.some(p => Math.abs(px - p) < MIN_GAP)) return;
        mk.classList.add('hover-reveal');
        activeHoverMarkers.push(mk);
        visiblePxs.push(px);
      });
    });
  });
  el.addEventListener('mouseleave', () => {
    activeHoverMarkers.forEach(mk => mk.classList.remove('hover-reveal'));
    activeHoverMarkers = [];
  });
});

// Year marker hover → fade non-associated entities
const entitiesByYear = {};
allEntities.forEach(el => {
  [parseInt(el.dataset.start), parseInt(el.dataset.end)].forEach(y => {
    if (!entitiesByYear[y]) entitiesByYear[y] = [];
    entitiesByYear[y].push(el);
  });
});

let activeHighlightEntities = [];
yearAxis.querySelectorAll('.year-marker').forEach(mk => {
  const y = parseInt(mk.dataset.markerY);
  mk.addEventListener('mouseenter', () => {
    activeHighlightEntities.forEach(el => el.classList.remove('date-highlight'));
    activeHighlightEntities = [];
    if (entitiesByYear[y]) {
      grid.classList.add('has-date-highlight');
      entitiesByYear[y].forEach(el => {
        el.classList.add('date-highlight');
        activeHighlightEntities.push(el);
      });
    }
  });
  mk.addEventListener('mouseleave', () => {
    grid.classList.remove('has-date-highlight');
    activeHighlightEntities.forEach(el => el.classList.remove('date-highlight'));
    activeHighlightEntities = [];
  });
});

// ═══════════════════════════════════════════════════════════════
//  SCROLL HANDLER
// ═══════════════════════════════════════════════════════════════

const yearIndicator   = document.getElementById('yearIndicator');
const periodIndicator = document.getElementById('periodIndicator');
const cursorYear      = document.getElementById('cursorYear');
const dateCursor      = document.getElementById('dateCursor');
const dateCrosshair   = document.getElementById('dateCrosshair');
const HEADER_H = 42;

dateCursor.addEventListener('mouseenter', () => dateCrosshair.classList.add('visible'));
dateCursor.addEventListener('mouseleave', () => dateCrosshair.classList.remove('visible'));

function onScroll() {
  const vpH = window.innerHeight;
  const vpMid = vpH / 2;
  const gridRect = grid.getBoundingClientRect();
  const rel = vpMid - gridRect.top;
  const bce = Y0 - rel / PX;
  const clamped = Math.max(Y1, Math.min(Y0, Math.round(bce)));
  const yearStr = fmtYr(clamped);
  yearIndicator.textContent = yearStr;
  cursorYear.textContent = yearStr;

  dateCursor.style.opacity = (gridRect.top < vpH && gridRect.bottom > 0) ? '1' : '0';

  let pName = '';
  for (const p of PERIODS) {
    if (clamped <= p.s && clamped > p.e) { pName = p.name + '  ' + p.hanzi; break; }
  }
  periodIndicator.textContent = pName;

  // Group label crossfade
  for (const [g, members] of Object.entries(groupMap)) {
    let totalScore = 0;
    const scores = [];
    for (const m of members) {
      const r = m.el.getBoundingClientRect();
      const visH = Math.max(0, Math.min(r.bottom, vpH) - Math.max(r.top, HEADER_H));
      const span = parseInt(m.el.dataset.span) || 1;
      const score = visH * span;
      totalScore += score;
      scores.push({ m, score });
    }
    for (const { m, score } of scores) {
      m.inner.style.opacity = totalScore > 0 ? score / totalScore : 0;
    }
  }

  // Position tall labels
  for (const { el, inner } of tallEntities) {
    const r = el.getBoundingClientRect();
    const visH = Math.min(r.bottom, vpH) - Math.max(r.top, HEADER_H);
    if (visH <= 0) continue;

    const innerH = inner.offsetHeight;
    const minEdge = Math.min(r.height * 0.12, 24);
    const vpTarget = vpMid - r.top - innerH / 2;
    const top = Math.max(minEdge, Math.min(r.height - innerH - minEdge, vpTarget));
    inner.style.top = top + 'px';
    if (!el.dataset.group) inner.style.opacity = '1';
  }
}

window.addEventListener('scroll', onScroll, { passive: true });
onScroll();

// ═══════════════════════════════════════════════════════════════
//  SCALE SLIDER
//
//  The magic: just update --px on the container.
//  All gridlines, markers, entities, period labels, and group
//  backgrounds reposition via CSS calc(). Only labels need JS.
// ═══════════════════════════════════════════════════════════════

const scaleSlider = document.getElementById('scaleSlider');
const scaleValueEl = document.getElementById('scaleValue');

scaleSlider.addEventListener('input', () => {
  const val = parseFloat(scaleSlider.value);
  const newPX = val * 4; // slider 0.1–1 → PX 0.4–4

  // Remember current year at viewport center
  const gridRect = grid.getBoundingClientRect();
  const vpMid = window.innerHeight / 2;
  const curYear = Y0 - (vpMid - gridRect.top) / PX;

  // Update PX
  PX = newPX;

  // THE KEY LINE: one CSS var change rescales everything
  timeline.style.setProperty('--px', PX);

  scaleValueEl.textContent = PX.toFixed(1) + ' px/yr';

  // Only JS work needed: update label display modes
  updateLabels();

  // Restore scroll position
  const mainTop = grid.closest('main').offsetTop;
  window.scrollTo(0, mainTop + yOff(curYear) * PX - vpMid);

  onScroll();
});

</script>
</body>
